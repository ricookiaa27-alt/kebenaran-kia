<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tic Tac Toe Online Couple</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div class="container">
    <h1>Tic Tac Toe Online </h1>

    <input id="roomCode" placeholder="Kode Room (misal: ricokgnkia27)">
    <button id="joinBtn">Join / Create Room</button>

    <p id="info">Belum masuk room</p>

    <div class="board" id="board" style="display:none;">
      <div class="cell" data-i="0"></div>
      <div class="cell" data-i="1"></div>
      <div class="cell" data-i="2"></div>
      <div class="cell" data-i="3"></div>
      <div class="cell" data-i="4"></div>
      <div class="cell" data-i="5"></div>
      <div class="cell" data-i="6"></div>
      <div class="cell" data-i="7"></div>
      <div class="cell" data-i="8"></div>
    </div>

    <button id="resetBtn" style="display:none;">Reset 🔁</button>
  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
